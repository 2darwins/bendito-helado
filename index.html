<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bendito Helado POS</title>
  <style>
    :root {
      --rosa-principal: #e91e63;
      --rosa-oscuro: #c2185b;
      --amarillo-dorado: #ffeb3b;
      --blanco-puro: #ffffff;
      --gris-claro: #f8f9fa;
    }

    body { font-family: 'Poppins', sans-serif; padding: 0; margin: 0; background-color: var(--gris-claro); display: flex; flex-direction: column; height: 100vh; }
    header { background-color: var(--rosa-principal); color: white; padding: 10px; text-align: center; }
    .app-container { display: flex; flex: 1; flex-direction: column; overflow-y: auto; }
    
    /* DISEÑO DE PRODUCTOS */
    #productos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
    .card { 
      background: white; border-radius: 10px; padding: 8px; text-align: center; border: 1px solid #ddd;
      display: flex; flex-direction: column; justify-content: space-between; align-items: center; height: 180px;
    }
    .card img { width: 100%; height: 70px; object-fit: cover; border-radius: 6px; }
    .card strong { font-size: 0.75em; height: 30px; display: flex; align-items: center; }
    
    /* BOTÓN ELIMINAR (OCULTO POR DEFECTO) */
    .btn-eliminar { display: none !important; }
    #productos.modo-config .btn-eliminar { 
      display: block !important; background: #ff4444; color: white; border: none; 
      width: 100%; padding: 5px; border-radius: 5px; cursor: pointer; margin-top: 5px;
    }
    #productos.modo-config .card { height: 210px; }

    /* CARRITO Y COBRO */
    .col-carrito, .col-cobro { padding: 15px; background: white; border-top: 2px solid #eee; }
    #carrito { list-style: none; padding: 0; }
    #carrito li { background: #fef1f6; margin-bottom: 5px; padding: 8px; border-radius: 5px; display: flex; justify-content: space-between; }
    .btn-cobrar { background: var(--rosa-principal); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 1.1em; }
    
    /* BOTONES PAGO RÁPIDO */
    .pago-rapido { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
    .pago-rapido button { padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; }

    /* CONFIG Y REPORTES */
    .btn-config { position: fixed; bottom: 15px; right: 15px; background: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--rosa-principal); z-index: 100; }
    #config { display:none; position:fixed; top:5%; left:5%; width: 90%; height: 90%; background:white; padding:20px; border-radius:15px; z-index:200; overflow-y:auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    input, select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
  </style>
</head>
<body>

<header><h1>BENDITO HELADO</h1></header>

<div class="app-container">
  <div class="col-productos">
    <div id="productos"></div>
  </div>

  <div class="col-carrito">
    <h3>🛒 Pedido: $<span id="total">0</span></h3>
    <ul id="carrito"></ul>
  </div>

  <div class="col-cobro">
    <div class="pago-rapido">
      <button onclick="pagoRapido('Efectivo')" style="background:#4caf50;">Efectivo</button>
      <button onclick="pagoRapido('Nequi')" style="background:#7030a0;">Nequi</button>
      <button onclick="pagoRapido('Daviplata')" style="background:#ff0000;">Daviplata</button>
    </div>
    <input id="pago" type="number" placeholder="¿Cuánto recibes?">
    <select id="metodo-pago">
      <option value="Efectivo">Efectivo</option>
      <option value="Nequi">Nequi</option>
      <option value="Daviplata">Daviplata</option>
    </select>
    <button onclick="procesarPago()" class="btn-cobrar">COBRAR</button>
    <h3 id="cambio" style="text-align:center">Cambio: $0</h3>
  </div>

  <div style="padding: 20px; background: #f0f0f0;">
    <button onclick="exportarCSV()" style="background: #28a745; color: white; padding: 10px; width: 100%; border: none; border-radius: 5px;">📥 Descargar Excel (CSV)</button>
    <h4>Ventas de hoy: <span id="resultado-reporte">$0</span></h4>
    <h4>Historial Reciente:</h4>
    <ul id="historial"></ul>
  </div>
</div>

<div class="btn-config" onclick="toggleConfig()">⚙️</div>

<div id="config">
  <button onclick="toggleConfig()" style="float:right">Cerrar X</button>
  <h2>Configuración</h2>
  <input type="text" id="nombre" placeholder="Nombre">
  <input type="number" id="precio" placeholder="Precio">
  <input type="file" id="imagen">
  <button onclick="agregarProducto()" style="width:100%; background: #007bff; color: white; padding: 15px; border: none; border-radius: 10px;">GUARDAR HELADO</button>
  <br><br>
  <button onclick="limpiarHistorial()" style="background: red; color: white;">BORRAR TODO EL HISTORIAL</button>
</div>

<script src="renderer.js"></script>
</body>
</html>

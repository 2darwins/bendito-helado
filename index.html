<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bendito Helado POS</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #f4f4f4; }
    header { background: #e91e63; color: white; padding: 10px; text-align: center; font-weight: bold; }

    /* CONTENEDOR PRINCIPAL */
    .main-container { display: flex; flex: 1; overflow: hidden; }

    /* COLUMNA IZQUIERDA: PRODUCTOS (CON SCROLL) */
    .col-productos { flex: 2; overflow-y: auto; padding: 10px; border-right: 1px solid #ccc; }
    #productos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .card { 
      background: #add8e6; border: 1px solid #87ceeb; border-radius: 8px; padding: 5px; 
      text-align: center; height: 160px; display: flex; flex-direction: column; justify-content: space-between;
      cursor: pointer;
    }
    .card strong { font-size: 0.75em; display: block; height: 30px; overflow: hidden; }
    .card img { width: 100%; height: 70px; object-fit: cover; border-radius: 4px; }
    .card span { font-weight: bold; font-size: 0.9em; }

    /* BOTÓN ELIMINAR (OCULTO POR DEFECTO) */
    .btn-eliminar { display: none !important; background: red; color: white; border: none; border-radius: 4px; padding: 3px; font-size: 10px; margin-top: 2px; }
    #productos.modo-config .btn-eliminar { display: block !important; }

    /* COLUMNA DERECHA: CARRITO Y PAGOS (FIJA) */
    .col-cobro { flex: 1.2; display: flex; flex-direction: column; background: white; padding: 10px; }
    
    .recibo-container { 
      flex: 1; border: 1px solid #ccc; padding: 10px; overflow-y: auto; 
      font-family: 'Courier New', monospace; background: #fff; margin-bottom: 10px;
    }
    #carrito { list-style: none; padding: 0; margin: 0; }
    #carrito li { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 4px; border-bottom: 1px dashed #eee; }

    .seccion-pago { background: #fffde7; padding: 10px; border-radius: 8px; border: 1px solid #ffe082; }
    .total-display { font-size: 1.8em; font-weight: bold; text-align: center; margin-bottom: 10px; }
    
    .pago-botones { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
    .pago-botones button { padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; font-size: 0.8em; }

    input[type="number"] { width: 100%; padding: 10px; font-size: 1.2em; text-align: center; margin-bottom: 10px; box-sizing: border-box; }
    .btn-confirmar { background: #e91e63; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 1.1em; }

    /* BOTÓN CONFIG ABAJO */
    .bottom-bar { padding: 10px; background: #eee; text-align: center; }

    /* MODAL CONFIG */
    #config { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
  </style>
</head>
<body>

<header>BENDITO HELADO</header>

<div class="main-container">
  <div class="col-productos">
    <div id="productos"></div>
  </div>

  <div class="col-cobro">
    <div class="recibo-container">
      <strong>RECIBO DE VENTA</strong>
      <hr>
      <ul id="carrito"></ul>
    </div>

    <div class="seccion-pago">
      <div class="total-display">TOTAL: $<span id="total">0</span></div>
      <div class="pago-botones">
        <button onclick="pagoRapido('Efectivo')" style="background:#4caf50;">Efectivo</button>
        <button onclick="pagoRapido('Nequi')" style="background:#7030a0;">Nequi</button>
        <button onclick="pagoRapido('Daviplata')" style="background:#ff0000;">Daviplata</button>
      </div>
      <input type="number" id="pago" placeholder="Dinero recibido" oninput="actualizarCambio()">
      <div style="text-align:center; font-weight:bold;">Cambio: $<span id="cambio">0</span></div>
      <br>
      <button onclick="procesarPago()" class="btn-confirmar">COBRAR</button>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <button onclick="toggleConfig()">⚙️ Configuración y Reportes</button>
</div>

<div id="config">
  <button onclick="toggleConfig()" style="float:right;">Cerrar X</button>
  <h3>Panel de Control</h3>
  <input type="text" id="nombre" placeholder="Nombre">
  <input type="number" id="precio" placeholder="Precio">
  <input type="file" id="imagen">
  <button onclick="agregarProducto()">Guardar Helado</button>
  <hr>
  <button onclick="exportarCSV()" style="background:green; color:white;">📥 Descargar Excel</button>
  <h4>Ventas hoy: <span id="reporte-hoy">$0</span></h4>
  <h4>Más vendido: <span id="top"></span></h4>
  <ul id="cantidades"></ul>
  <button onclick="limpiarHistorial()" style="background:red; color:white;">Borrar Todo el Historial</button>
</div>

<script src="renderer.js"></script>
</body>
</html>

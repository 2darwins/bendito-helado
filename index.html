<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bendito Helado POS</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f9f9f9; }
    header { background: #e91e63; color: white; padding: 8px; text-align: center; font-weight: bold; font-size: 1.1em; }
    .recibo-top { background: #fff; border-bottom: 2px solid #ddd; height: 80px; overflow-y: auto; padding: 5px 15px; font-family: monospace; font-size: 0.85em; }
    #carrito { list-style: none; padding: 0; margin: 0; }
    #carrito li { display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding: 2px 0; }
    .contenedor-productos { flex: 1; overflow-y: auto; padding: 10px; }
    #productos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .card { background: #add8e6; border: 1px solid #87ceeb; border-radius: 4px; padding: 3px; text-align: center; height: 105px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
    .card strong { font-size: 0.6em; line-height: 1; }
    .card img { width: 100%; height: 45px; object-fit: cover; border-radius: 3px; }
    .card span { font-size: 0.75em; }
    .panel-pago { background: #fffde7; padding: 10px; border-top: 2px solid #ffe082; }
    .total-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .pago-metodos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 8px; }
    .pago-metodos button { padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; font-size: 0.75em; }
    #pago { flex: 1; padding: 10px; font-size: 1.1em; border-radius: 5px; border: 1px solid #ccc; text-align: center; }
    .btn-cobrar { background: #e91e63; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 1.2em; }
    .config-btn { text-align: center; padding: 8px; background: #eee; font-size: 0.8em; cursor: pointer; }
    #config { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; padding:20px; overflow-y:auto; box-sizing:border-box; }
    .stat-card { padding: 10px; border-radius: 8px; border-left: 5px solid; }
  </style>
</head>
<body>

<header>BENDITO HELADO</header>

<div class="recibo-top">
  <div style="font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 3px;">PEDIDO ACTUAL:</div>
  <ul id="carrito"></ul>
</div>

<div class="contenedor-productos">
  <div id="productos"></div>
</div>

<div class="panel-pago">
  <div style="background: #e1f5fe; padding: 8px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #b3e5fc; display: flex; flex-direction: column; gap: 5px;">
    <div style="display: flex; gap: 5px;">
      <input type="number" id="cliente-cedula" placeholder="Cédula (Cliente Frecuente)" oninput="buscarCliente()" style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #90caf9;">
      <button onclick="registrarCliente()" style="background: #0288d1; color: white; border: none; border-radius: 4px; padding: 0 10px;">💾</button>
    </div>
    <div id="datos-cliente-extra" style="display: none; display: flex; gap: 5px;">
      <input type="text" id="cliente-nombre" placeholder="Nombre" style="flex: 1; padding: 5px; font-size: 0.8em;">
      <input type="email" id="cliente-correo" placeholder="Correo" style="flex: 1; padding: 5px; font-size: 0.8em;">
    </div>
  </div>

  <div class="total-area">
    <span>TOTAL:</span>
    <h2>$<span id="total">0</span></h2>
  </div>
  <div class="pago-metodos">
    <button onclick="pagoRapido('Efectivo')" style="background:#4caf50;">EFECTIVO</button>
    <button onclick="pagoRapido('Nequi')" style="background:#7030a0;">NEQUI</button>
    <button onclick="pagoRapido('Daviplata')" style="background:#ff0000;">DAVIPLATA</button>
  </div>
  <div style="display: flex; gap: 5px; align-items: center; margin-bottom: 8px;">
    <input type="number" id="pago" placeholder="Efectivo recibido" oninput="actualizarCambio()">
    <div style="font-size: 0.9em; font-weight: bold;">Cambio: $<span id="cambio">0</span></div>
  </div>
  <button onclick="procesarPago()" class="btn-cobrar">FINALIZAR VENTA</button>
</div>

<div class="config-btn" onclick="toggleConfig()">⚙️ ADMINISTRACIÓN</div>

<div id="config">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e91e63; margin-bottom: 15px; padding-bottom: 10px;">
        <h2 style="margin: 0; color: #e91e63;">ADMINISTRACIÓN</h2>
        <button onclick="toggleConfig()" style="background: #333; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer;">X</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
        <div class="stat-card" style="background: #e3f2fd; border-color: #2196f3;"><small>Hoy</small><div id="reporte-hoy" style="font-weight:bold;">$0</div></div>
        <div class="stat-card" style="background: #f1f8e9; border-color: #4caf50;"><small>Mes</small><div id="reporte-mes" style="font-weight:bold;">$0</div></div>
        <div class="stat-card" style="background: #fff3e0; border-color: #ff9800;"><small>Mes Pasado</small><div id="reporte-mes-pasado" style="font-weight:bold;">$0</div></div>
        <div class="stat-card" style="background: #f3e5f5; border-color: #9c27b0;"><small>Top</small><div id="top" style="font-weight:bold; font-size:0.8em;">N/A</div></div>
    </div>

    <div style="background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <h4 style="margin-top: 0;">+ AGREGAR PRODUCTO</h4>
        <input type="text" id="nombre" placeholder="Nombre" style="width: 100%; padding: 8px; margin-bottom: 8px;">
        <input type="number" id="precio" placeholder="Precio" style="width: 100%; padding: 8px; margin-bottom: 8px;">
        <input type="file" id="imagen" style="margin-bottom: 10px; width: 100%;">
        <button onclick="agregarProducto()" style="width: 100%; padding: 10px; background: #e91e63; color: white; border: none; border-radius: 5px; font-weight: bold;">GUARDAR</button>
    </div>

    <div style="background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px;">
        <h4 style="margin-top:0; border-bottom: 2px solid #ff5252; padding-bottom: 5px;">ELIMINAR DEL MENÚ</h4>
        <div id="lista-eliminar" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
    </div>

    <div style="display: flex; gap: 10px;">
        <button onclick="exportarCSV()" style="flex: 1; background: #2e7d32; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold;">EXCEL</button>
        <button onclick="limpiarHistorial()" style="flex: 1; background: #c62828; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold;">BORRAR VENTAS</button>
    </div>
</div>

<script src="renderer.js"></script>
</body>
</html>

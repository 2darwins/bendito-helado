<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>App Helados</title>

  <style>
    body {
      font-family: Arial;
      margin: 10px;
      padding-bottom: 100px; /* Espacio para que el botón de config no tape nada */
    }

    h2 {
      margin-top: 10px;
    }

    /* --- AJUSTE MOSAICO 3 COLUMNAS --- */
    #productos {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* Exactamente 3 columnas */
      gap: 10px;
      margin-bottom: 15px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 180px; /* Altura fija para que todos se vean iguales */
    }

    .img-producto {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      margin: 5px 0;
    }

    /* --- BOTÓN ELIMINAR (Se activa en config) --- */
    .btn-eliminar {
      display: none; /* Oculto por defecto */
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px;
      font-size: 10px;
    }

    /* Clase para mostrar el botón cuando se abre config */
    .modo-config .btn-eliminar {
      display: block;
    }

    #carrito {
      margin-bottom: 10px;
    }

    button {
      margin: 5px;
      padding: 8px;
      cursor: pointer;
    }

    /* CONFIG */
    #config {
      display: none;
      border-top: 2px solid #ccc;
      margin-top: 20px;
      padding-top: 10px;
    }

    .bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      padding: 10px;
      border-top: 1px solid #ccc;
      text-align: center;
    }
  </style>
</head>

<body>

  <h2>Productos</h2>
  <div id="productos"></div>

  <h2>Carrito</h2>
  <ul id="carrito"></ul>

  <h3>Total: $<span id="total">0</span></h3>

  <input type="number" id="pago" placeholder="Dinero recibido" oninput="actualizarCambio()">

  <br>

  <button onclick="pagoRapido('Efectivo')" style="background: #4caf50; color: white; border: none; border-radius: 5px;">Efectivo</button>
  <button onclick="pagoRapido('Nequi')" style="background: #7030a0; color: white; border: none; border-radius: 5px;">Nequi</button>
  <button onclick="pagoRapido('Daviplata')" style="background: #ff0000; color: white; border: none; border-radius: 5px;">Daviplata</button>
  
  <br>
  
  <button onclick="pagoRapido(5000)">5000</button>
  <button onclick="pagoRapido(10000)">10000</button>
  <button onclick="pagoRapido(20000)">20000</button>

  <br>

  <button onclick="procesarPago()" style="width: 100%; padding: 15px; background: #e91e63; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1em;">Pagar</button>

  <h3>Cambio: $<span id="cambio">0</span></h3>

  <h3>Más vendido: <span id="top"></span></h3>

  <h3>Cantidades</h3>
  <ul id="cantidades"></ul>

  <div class="bottom">
    <button onclick="toggleConfig()">⚙️ Configuración</button>
  </div>

  <div id="config">
    <h3>Agregar Producto</h3>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="number" id="precio" placeholder="Precio">
    <input type="file" id="imagen">

    <br>

    <button onclick="agregarProducto()">Guardar producto</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
